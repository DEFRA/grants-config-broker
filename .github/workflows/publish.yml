name: Publish

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: write
  pull-requests: write

env:
  AWS_REGION: eu-west-2
  AWS_ACCOUNT_ID: "094954420758"

jobs:
  build:
    if: github.run_number != 1 && github.actor != 'github-actions[bot]' && !contains(github.event.head_commit.message, 'Archive release.yml')
    name: CDP-build-workflow
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v6
        with:
          fetch-depth: '2'

      - name: Check release.yml
        id: release_yml
        run: |
          BASE=${{ github.event.before }}
          HEAD=${{ github.sha }}

          files_changed=$(git diff --name-only $BASE $HEAD)
          files_changed_length=$(echo "$files_changed" | wc -l)

          if [[ "$files_changed" = *"release/release.yml"* ]]; then
            echo "release/release.yml present in changes"
            yamllint release/release.yml

            if [ $files_changed_length -eq 1 ]; then
              echo "no other files present so skipping some redundant steps"
              echo "release_only=true" >> $GITHUB_OUTPUT
            fi
          else
            echo "no release.yml found in changes"
          fi


      - name: Test code and Create Test Coverage Reports
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: |
          npm ci
          npm test

      - name: Parse release info
        id: parse_release
        run: |
          node scripts/parse_release_info.js

      - name: Checkout target repository
        if: steps.parse_release.outputs.exists == 'true'
        uses: actions/checkout@v6
        with:
          repository: ${{ steps.parse_release.outputs.repository }}
          ref: ${{ steps.parse_release.outputs.grant_version }}
          path: grant-config-checkout

      - name: Move grant config files
        if: steps.parse_release.outputs.exists == 'true'
        run: |
          cp release/release.yml config/
          cp -r grant-config-checkout/${{ steps.parse_release.outputs.directory }} config/

      - name: Build and Publish
        uses: DEFRA/cdp-build-action/build@main
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: SonarCloud Scan
        if: steps.release_yml.outputs.release_only != 'true'
        uses: SonarSource/sonarqube-scan-action@v7.0.0
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: Update deployment matrix
        if: steps.parse_release.outputs.exists == 'true'
        run: |
          node scripts/update_deployment_matrix.js

      - name: Move release.yml if it exists
        id: move_release
        if: steps.parse_release.outputs.exists == 'true'
        run: |
          timestamp=$(date +%Y_%m_%d__%H%M)
          new_file="release/previous/${timestamp}_release.yml"
          mv release/release.yml "$new_file"
          tag=$(git tag --points-at HEAD | head -n 1)
          yq -i ".brokerVersion = \"$tag\"" "$new_file"
          echo "moved_file=true" >> $GITHUB_OUTPUT
          echo "previous_file=$new_file" >> $GITHUB_OUTPUT

      - name: Create post-release PR
        if: steps.move_release.outputs.moved_file == 'true'
        uses: peter-evans/create-pull-request@v8
        with:
          sign-commits: true
          title: '[patch] Archive release.yml'
          body: 'Automated changes to archive release.yml'
          commit-message: '[patch] Archive release.yml'
          add-paths: release/
          branch: 'archive-release/patch'
