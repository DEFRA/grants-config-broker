name: Check Pull Request

on:
  pull_request:
    branches:
      - main
      - minimal
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review

jobs:
  pr-validator:
    name: Run Pull Request Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Check release.yml
        run: |
          files_changed=$(git diff --name-only HEAD)
          files_changed_length=$(git diff --name-only HEAD | wc -l)
          echo $files_changed
          echo $files_changed_length
          if [[ "$files_changed" = *"release/release.yml"* ]]; then
            echo "release/release.yml present in changes"
            yamllint release/release.yml

            if [ $files_changed_length -eq 1 ]; then
              echo "no other files present so skipping some redundant steps"
            fi
          echo "release_only=true" >> $GITHUB_OUTPUT
          else
            echo "no release.yml found in changes"
          fi

      - name: Test code and Create Test Coverage Reports
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: |
          npm ci
          npm run format:check
          npm run lint
          npm test

      - name: Security audit
        run: npm run security-audit

      - name: Test Docker Image Build
        run: |
          set +e
          docker build --no-cache --tag cdp-node-backend-template .
          exit $?

      - name: SonarCloud Scan
        if: github.actor != 'dependabot[bot]'
        uses: SonarSource/sonarqube-scan-action@v7.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
