name: Check Pull Request

on:
  pull_request:
    branches:
      - main
      - minimal
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review

jobs:
  pr-validator:
    name: Run Pull Request Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check release.yml
        id: release_yml
        run: |
          BASE=${{ github.event.pull_request.base.sha }}
          HEAD=${{ github.event.pull_request.head.sha }}

          files_changed=$(git diff --name-only $BASE $HEAD)
          files_changed_length=$(echo "$files_changed" | wc -l)
          release_change=$(git diff --name-status $BASE $HEAD | grep -E "^[AM].*release/release.yml" || true)

          if [ -n "$release_change" ]; then
            echo "release/release.yml present in changes"
            yamllint release/release.yml

            if [ $files_changed_length -eq 1 ]; then
              echo "no other files present so skipping some redundant steps"
              echo "release_only=true" >> $GITHUB_OUTPUT
            fi
          else
            echo "no release.yml found in changes"
          fi

      - name: Setup Node environment
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: |
          npm ci

      - name: Parse release info
        id: parse_release
        run: |
          node scripts/parse_release_info.js

      - name: Test code and Create Test Coverage Reports
        if: steps.release_yml.outputs.release_only != 'true'
        run: |
          npm run format:check
          npm run lint
          npm test

      - name: Security audit
        if: steps.release_yml.outputs.release_only != 'true'
        run: npm run security-audit

      - name: Test Docker Image Build
        if: steps.release_yml.outputs.release_only != 'true'
        run: |
          set +e
          docker build --no-cache --tag cdp-node-backend-template .
          exit $?

      - name: SonarCloud Scan
        if: github.actor != 'dependabot[bot]' && steps.release_yml.outputs.release_only != 'true'
        uses: SonarSource/sonarqube-scan-action@v7.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
